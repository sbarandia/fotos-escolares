<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Fotos Escolares</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- CSS propio -->
    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow">

                <div class="card-body">

                    <h2 class="mb-4">
                        Pedido de Fotos Escolares
                    </h2>

                    <form>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Apellido
                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    id="apellido">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Nombre
                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    id="nombre">

                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Grado
                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    id="grado">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Email
                                </label>

                                <input
                                    type="email"
                                    class="form-control"
                                    id="email">

                            </div>

                        </div>

                        <button
                            type="button"
                            class="btn btn-primary"
                            id="btnPrueba">

                            Probar JavaScript

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="js/app.js"></script>

</body>

</html>
